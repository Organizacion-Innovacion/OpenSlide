services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: openslide-server
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - ./slides:/app/slides
      - ./config:/app/config
    networks:
      - openslide-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/projects"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: openslide-client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - openslide-net
    restart: unless-stopped

networks:
  openslide-net:
    driver: bridge
