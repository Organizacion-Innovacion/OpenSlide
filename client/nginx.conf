server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/openslide_access.log;
    error_log  /var/log/nginx/openslide_error.log;

    # ── SSE: generación en streaming ────────────────────────────────────────
    location /openslide/api/ai/generate-stream {
        proxy_pass http://server:3001/api/ai/generate-stream;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header Connection '';
        proxy_buffering             off;
        proxy_cache                 off;
        proxy_read_timeout          300s;
        proxy_connect_timeout       10s;
        chunked_transfer_encoding   on;
    }

    # ── API general ─────────────────────────────────────────────────────────
    location /openslide/api/ {
        proxy_pass http://server:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Slides estáticos servidos por Express ───────────────────────────────
    location /openslide/slides/ {
        proxy_pass http://server:3001/slides/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1m;
    }

    # ── Redirect /openslide → /openslide/ ───────────────────────────────────
    location = /openslide {
        return 301 /openslide/;
    }

    # ── SPA: /openslide/* → archivos estáticos con fallback a index.html ────
    location ^~ /openslide/ {
        alias /usr/share/nginx/html/;
        try_files $uri @openslide_spa;
    }

    location @openslide_spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml;
    gzip_min_length 1000;
}
