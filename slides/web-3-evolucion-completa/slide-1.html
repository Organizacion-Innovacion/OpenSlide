<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin:0; background:#0a0a0a; font-family:'Segoe UI',Arial,sans-serif; color:#e0e0e0; overflow:hidden; }
    .slide { width:1280px; height:720px; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:80px; box-sizing:border-box; position:relative; background:linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); }
    
    .title-container { text-align:center; z-index:2; margin-bottom:40px; }
    h1 { font-size:72px; font-weight:700; margin:0 0 24px; color:#fff; line-height:1.1; text-shadow:0 0 30px rgba(74,222,128,0.3); }
    .subtitle { font-size:32px; color:#4ade80; margin:0; font-weight:300; letter-spacing:1px; }
    
    .timeline-container { position:relative; width:100%; max-width:1000px; height:200px; margin-top:60px; }
    
    .timeline-line { position:absolute; top:50%; left:50px; right:50px; height:3px; background:linear-gradient(90deg, #4ade80 0%, #22d3ee 50%, #a78bfa 100%); transform:translateY(-50%); box-shadow:0 0 20px rgba(74,222,128,0.4); }
    
    .timeline-item { position:absolute; top:50%; transform:translateY(-50%); text-align:center; }
    
    .timeline-icon { width:80px; height:80px; border-radius:50%; background:rgba(74,222,128,0.1); border:3px solid #4ade80; display:flex; align-items:center; justify-content:center; font-size:32px; font-weight:700; color:#4ade80; margin:0 auto 12px; box-shadow:0 0 25px rgba(74,222,128,0.3); transition:all 0.3s; position:relative; }
    
    .timeline-icon::before { content:''; position:absolute; width:100%; height:100%; border-radius:50%; background:rgba(74,222,128,0.2); animation:pulse 2s infinite; }
    
    @keyframes pulse {
      0%, 100% { transform:scale(1); opacity:1; }
      50% { transform:scale(1.2); opacity:0; }
    }
    
    .timeline-label { font-size:18px; color:#e0e0e0; font-weight:600; white-space:nowrap; }
    
    .item-1 { left:0; }
    .item-1 .timeline-icon { border-color:#4ade80; color:#4ade80; background:rgba(74,222,128,0.1); }
    
    .item-2 { left:33%; transform:translate(-50%, -50%); }
    .item-2 .timeline-icon { border-color:#22d3ee; color:#22d3ee; background:rgba(34,211,238,0.1); box-shadow:0 0 25px rgba(34,211,238,0.3); }
    .item-2 .timeline-icon::before { background:rgba(34,211,238,0.2); }
    
    .item-3 { left:66%; transform:translate(-50%, -50%); }
    .item-3 .timeline-icon { border-color:#a78bfa; color:#a78bfa; background:rgba(167,139,250,0.1); box-shadow:0 0 25px rgba(167,139,250,0.3); }
    .item-3 .timeline-icon::before { background:rgba(167,139,250,0.2); }
    
    .item-4 { right:0; transform:translateY(-50%); }
    .item-4 .timeline-icon { border-color:#f472b6; color:#f472b6; background:rgba(244,114,182,0.1); box-shadow:0 0 25px rgba(244,114,182,0.3); animation:glow 2s infinite; }
    .item-4 .timeline-icon::before { background:rgba(244,114,182,0.2); }
    
    @keyframes glow {
      0%, 100% { box-shadow:0 0 25px rgba(244,114,182,0.3); }
      50% { box-shadow:0 0 40px rgba(244,114,182,0.6); }
    }
    
    .grid-bg { position:absolute; width:100%; height:100%; opacity:0.03; background-image:linear-gradient(#4ade80 1px, transparent 1px), linear-gradient(90deg, #4ade80 1px, transparent 1px); background-size:50px 50px; z-index:0; }
    
    .accent-line { position:absolute; left:0; top:0; width:6px; height:100%; background:linear-gradient(180deg, #4ade80 0%, #22d3ee 50%, #a78bfa 100%); box-shadow:0 0 20px rgba(74,222,128,0.4); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="accent-line"></div>
    <div class="grid-bg"></div>
    
    <div class="title-container">
      <h1>La Evolución de la Web:<br>Del Estático a lo Descentralizado</h1>
      <p class="subtitle">Un Viaje desde Web 1.0 hasta Web 3.0</p>
    </div>
    
    <div class="timeline-container">
      <div class="timeline-line"></div>
      
      <div class="timeline-item item-1">
        <div class="timeline-icon">1.0</div>
        <div class="timeline-label">Estática</div>
      </div>
      
      <div class="timeline-item item-2">
        <div class="timeline-icon">2.0</div>
        <div class="timeline-label">Interactiva</div>
      </div>
      
      <div class="timeline-item item-3">
        <div class="timeline-icon">2.5</div>
        <div class="timeline-label">Social</div>
      </div>
      
      <div class="timeline-item item-4">
        <div class="timeline-icon">3.0</div>
        <div class="timeline-label">Descentralizada</div>
      </div>
    </div>
  </div>
</body>
</html>
